<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Helios Resume Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --ink:#0f0f0e;--ink2:#3d3d38;--ink3:#7a7a72;
      --paper:#faf8f3;--paper2:#f2efe7;--paper3:#e8e4d8;
      --accent:#0f4c81;--accent2:#1a6db5;--accent-bg:#e8f0fb;
      --green:#2d6a3f;--green-bg:#e8f5ed;--green-bd:#7ec89a;
      --amber:#8a5a00;--amber-bg:#fff3d4;--amber-bd:#d4a017;
      --red:#8b2020;--red-bg:#fdeaea;--red-bd:#e08080;
      --gold:#b08430;--gold-bg:#fdf3dc;
      --sun:#c45c00;--sun-bg:#fff4ec;--sun-bd:#f0a060;
      --r:10px;--r-lg:16px;
      --sh:0 2px 12px rgba(15,15,14,.08);
      --sh-lg:0 8px 40px rgba(15,15,14,.14);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:15px;}
    .wrap{max-width:1060px;margin:0 auto;padding:28px 16px 80px;}

    /* ── HEADER ── */
    .hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:2px solid var(--paper3);margin-bottom:24px;flex-wrap:wrap;gap:10px;}
    .logo{display:flex;align-items:center;gap:14px;}
    .logo-ico{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#0f4c81,#c45c00);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(196,92,0,.28);}
    .logo h1{font-family:'DM Serif Display',serif;font-size:23px;line-height:1.1;}
    .logo p{font-size:11px;color:var(--ink3);margin-top:2px;}
    .hdr-pill{background:var(--sun-bg);border:1px solid var(--sun-bd);padding:5px 12px;border-radius:20px;font-size:11px;color:var(--sun);font-weight:700;}

    /* ── SCREENS ── */
    .screen{animation:fu .25s ease both;}
    @keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    /* ── SETUP SCREEN ── */
    .setup-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
    @media(max-width:680px){.setup-cols{grid-template-columns:1fr;}}

    .panel{background:#fff;border:1.5px solid var(--paper3);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh);}
    .panel.jd{border-color:var(--sun-bd);background:linear-gradient(160deg,#fff 85%,var(--sun-bg) 100%);}
    .panel-lbl{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:12px;}
    .pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
    .pill-sun{background:var(--sun-bg);color:var(--sun);border:1px solid var(--sun-bd);}
    .pill-blue{background:var(--accent-bg);color:var(--accent);border:1px solid #b3cdf5;}
    .pill-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}

    /* API banner */
    .api-band{background:linear-gradient(135deg,#0f4c81,#1a6db5);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:18px;box-shadow:var(--sh-lg);}
    .api-band h3{color:#fff;font-size:13px;font-weight:600;margin-bottom:2px;}
    .api-band p{color:#a8c8f0;font-size:11px;margin-bottom:10px;}
    .api-row{display:flex;gap:8px;flex-wrap:wrap;}
    .api-band input{flex:1;min-width:180px;padding:8px 11px;border-radius:7px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-family:'DM Mono',monospace;outline:none;}
    .api-band input::placeholder{color:rgba(255,255,255,.4);}
    .api-band input:focus{border-color:rgba(255,255,255,.6);}
    .api-save{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;background:#fff;color:var(--accent);font-weight:700;font-size:12px;font-family:'Outfit',sans-serif;white-space:nowrap;}
    .api-note{font-size:10px;color:rgba(255,255,255,.35);margin-top:6px;}
    .api-note a{color:#7ab8f5;}
    .api-err{font-size:11px;color:#ffb3b3;margin-top:5px;}
    .api-ok{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:9px;background:var(--green-bg);border:1px solid var(--green-bd);font-size:13px;font-weight:500;color:var(--green);margin-bottom:18px;}
    .api-ok button{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:11px;margin-left:auto;font-family:'Outfit',sans-serif;}

    /* JD textarea */
    .jd-ta{width:100%;font-family:'DM Mono',monospace;font-size:11.5px;line-height:1.75;resize:vertical;min-height:220px;border:1.5px solid var(--paper3);border-radius:8px;padding:10px 12px;outline:none;color:var(--ink2);background:rgba(255,255,255,.8);}
    .jd-ta:focus{border-color:var(--sun-bd);box-shadow:0 0 0 3px rgba(196,92,0,.08);}

    /* Candidate section */
    .cand-section{display:flex;flex-direction:column;gap:10px;}

    /* CSV toolbar */
    .csv-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:9px 12px;background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--r);}
    .file-btn{display:inline-flex;align-items:center;gap:5px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer;border:1.5px solid var(--paper3);background:#fff;color:var(--ink);transition:all .15s;position:relative;}
    .file-btn:hover{background:var(--paper2);}
    .file-btn input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;}
    .csv-msg{font-size:10px;font-weight:600;}

    /* Upload zone */
    .upload-zone{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1.5px dashed var(--paper3);background:var(--paper2);cursor:pointer;font-size:12px;color:var(--ink2);transition:all .2s;position:relative;}
    .upload-zone:hover{border-color:var(--accent2);background:var(--accent-bg);}
    .upload-zone input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;}
    .uz-done{border-color:var(--green-bd);background:var(--green-bg);}
    .uz-err{border-color:var(--red-bd);background:var(--red-bg);}
    .uz-load{opacity:.6;pointer-events:none;}

    /* Name input */
    input.name-in{width:100%;font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink);border:1.5px solid var(--paper3);border-radius:8px;padding:8px 11px;outline:none;transition:border-color .2s;}
    input.name-in:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(26,109,181,.08);}

    /* Resume textarea */
    .res-ta{width:100%;font-family:'DM Mono',monospace;font-size:11.5px;line-height:1.65;resize:vertical;min-height:80px;border:1.5px solid var(--paper3);border-radius:8px;padding:8px 11px;outline:none;color:var(--ink2);}
    .res-ta:focus{border-color:var(--accent2);}

    /* Queue */
    .queue-wrap{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--r);padding:10px 12px;}
    .queue-title{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
    .q-item{display:flex;align-items:center;gap:7px;padding:5px 8px;background:#fff;border:1px solid var(--paper3);border-radius:7px;margin-bottom:4px;font-size:12px;}
    .q-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
    .q-name{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .q-tag{font-size:9px;padding:1px 5px;border-radius:8px;border:1px solid var(--paper3);background:var(--paper2);color:var(--ink3);}
    .q-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:15px;padding:0 2px;line-height:1;flex-shrink:0;}
    .q-del:hover{color:var(--red);}

    /* SCAN button */
    .scan-wrap{text-align:center;margin-top:4px;}
    .scan-btn{width:100%;padding:15px 24px;border-radius:13px;background:linear-gradient(135deg,#0f4c81 0%,#c45c00 100%);color:#fff;border:none;cursor:pointer;font-family:'DM Serif Display',serif;font-size:18px;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(15,76,129,.25),0 2px 8px rgba(196,92,0,.2);transition:all .2s;}
    .scan-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 26px rgba(196,92,0,.35);}
    .scan-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
    .scan-hint{font-size:11px;color:var(--ink3);margin-top:7px;}

    /* ── SCANNING SCREEN ── */
    .scan-screen{text-align:center;padding:60px 20px 40px;}
    .scan-screen h2{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:6px;}
    .scan-screen .sub{font-size:13px;color:var(--ink3);margin-bottom:28px;line-height:1.6;}
    .prog-track{background:var(--paper3);border-radius:99px;height:10px;max-width:480px;margin:0 auto 10px;overflow:hidden;}
    .prog-fill{height:10px;border-radius:99px;background:linear-gradient(90deg,#0f4c81,#c45c00);transition:width .5s ease;}
    .prog-txt{font-size:12px;color:var(--ink3);}
    .scan-name{font-size:14px;font-weight:600;color:var(--accent);margin-top:14px;min-height:22px;}
    .scan-dots{display:flex;gap:8px;justify-content:center;margin-top:20px;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--paper3);animation:dotPulse 1.4s ease-in-out infinite;}
    .dot:nth-child(2){animation-delay:.2s;}
    .dot:nth-child(3){animation-delay:.4s;}
    @keyframes dotPulse{0%,80%,100%{transform:scale(1);background:var(--paper3);}40%{transform:scale(1.4);background:var(--accent);}}

    /* ── RESULTS SCREEN ── */
    .res-hdr-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
    .res-title{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.1;}
    .res-sub{font-size:11px;color:var(--ink3);margin-top:3px;}
    .res-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

    /* Metrics */
    .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px;}
    @media(max-width:580px){.metrics{grid-template-columns:repeat(2,1fr);}}
    .metric{background:#fff;border:1px solid var(--paper3);border-radius:var(--r);padding:11px 13px;}
    .m-l{font-size:9px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .m-v{font-size:25px;font-weight:700;font-family:'DM Serif Display',serif;line-height:1;}

    /* Tabs */
    .tabs{display:flex;gap:2px;background:var(--paper2);padding:3px;border-radius:10px;margin-bottom:18px;width:fit-content;flex-wrap:wrap;}
    .tab{padding:6px 15px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:var(--ink3);font-family:'Outfit',sans-serif;transition:all .15s;}
    .tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08);}

    /* Band header */
    .band-hdr{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:8px;margin:15px 0 6px;font-size:11px;font-weight:700;letter-spacing:.04em;}

    /* Result card */
    .rc{background:#fff;border:1px solid var(--paper3);border-radius:var(--r-lg);margin-bottom:6px;overflow:hidden;transition:box-shadow .2s;}
    .rc:hover{box-shadow:var(--sh);}
    .rc-top{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;}
    .rank-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;background:var(--paper2);color:var(--ink3);}
    .rank-circle.gold{background:var(--gold-bg);color:var(--gold);}
    .av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
    .rc-info{flex:1;min-width:0;}
    .rc-name{font-size:13px;font-weight:700;}
    .rc-sum{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .badge-rec{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;flex-shrink:0;white-space:nowrap;}
    .b-s{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
    .b-m{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
    .b-n{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
    .score-ring{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2.5px solid;}
    .sr-n{font-size:15px;font-weight:800;line-height:1;}
    .sr-d{font-size:8px;opacity:.7;}
    .chev{flex-shrink:0;color:var(--ink3);transition:transform .22s;}
    .chev.open{transform:rotate(180deg);}
    .icon-btn{background:none;border:1px solid var(--paper3);border-radius:6px;cursor:pointer;padding:3px 7px;color:var(--ink3);display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;flex-shrink:0;transition:all .15s;font-family:'Outfit',sans-serif;}
    .icon-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent2);}
    .rm-btn{background:none;border:1px solid var(--paper3);border-radius:6px;cursor:pointer;padding:3px 7px;color:var(--ink3);font-size:14px;line-height:1;flex-shrink:0;transition:all .15s;}
    .rm-btn:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
    .rc-body{padding:12px 14px;border-top:1px solid var(--paper3);background:var(--paper2);}
    .sg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .sg-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
    .tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;margin:2px 2px 2px 0;}

    /* Buttons */
    .btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:6px 13px;border-radius:8px;cursor:pointer;border:1.5px solid var(--paper3);background:#fff;color:var(--ink);transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
    .btn:hover:not(:disabled){background:var(--paper2);}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-p{background:var(--accent);color:#fff;border-color:var(--accent);}
    .btn-p:hover:not(:disabled){background:var(--accent2);}

    /* Table */
    .tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--paper3);}
    table{width:100%;border-collapse:collapse;font-size:11px;background:#fff;}
    thead tr{background:var(--accent);color:#fff;}
    th{padding:8px 10px;text-align:left;font-weight:600;font-size:10px;letter-spacing:.04em;white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--paper3);cursor:pointer;transition:background .12s;}
    tbody tr:hover{background:var(--accent-bg);}
    td{padding:7px 10px;vertical-align:middle;}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(15,15,14,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:660px;max-height:87vh;display:flex;flex-direction:column;box-shadow:var(--sh-lg);animation:slideUp .2s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .modal-hdr{display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--paper3);flex-shrink:0;}
    .modal-ttl{font-family:'DM Serif Display',serif;font-size:16px;flex:1;}
    .modal-x{background:none;border:1px solid var(--paper3);border-radius:6px;cursor:pointer;color:var(--ink3);width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .modal-x:hover{background:var(--red-bg);color:var(--red);}
    .m-tab-bar{display:flex;gap:2px;padding:7px 11px 0;background:var(--paper2);border-bottom:1px solid var(--paper3);}
    .m-tab{padding:5px 11px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--ink3);font-family:'Outfit',sans-serif;}
    .m-tab.on{background:#fff;color:var(--ink);border-color:var(--paper3);}
    .modal-body{overflow-y:auto;padding:15px 17px;flex:1;}
    .resume-pre{font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;white-space:pre-wrap;word-break:break-word;background:var(--paper2);border:1px solid var(--paper3);border-radius:8px;padding:13px;}
    .ai-box{background:var(--accent);border-radius:10px;padding:14px 16px;color:#a8c8f0;font-size:12px;line-height:1.75;}
    .ai-box h4{color:#fff;font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:9px;}
    .spin-wrap{display:flex;align-items:center;gap:7px;color:var(--ink3);font-size:12px;padding:10px 0;}
    .spinner{width:15px;height:15px;border:2px solid var(--paper3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* SOP */
    .sop-pre{font-family:'DM Mono',monospace;font-size:11px;line-height:1.85;white-space:pre-wrap;padding:16px 18px;color:var(--ink2);}
    .info-box{background:var(--accent);color:#a8c8f0;border-radius:var(--r-lg);padding:18px 20px;margin-bottom:16px;font-size:12px;line-height:1.8;}
    .info-box h2{font-family:'DM Serif Display',serif;color:#fff;font-size:18px;margin-bottom:10px;}
    .info-box h3{color:#6ba8d8;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin:10px 0 3px;}
  </style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>

async function extractPDF(arrayBuffer) {
  try {
    const pdf = await pdfjsLib.getDocument({data: new Uint8Array(arrayBuffer)}).promise;
    let text = '';
    for(let i=1; i<=pdf.numPages; i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item=>item.str).join(' ');
      text += pageText + '\n';
    }
    return text.trim();
  } catch(e) {
    throw new Error('PDF extraction failed: ' + e.message);
  }
}

async function analyzeWithGemini(apiKey, name, resumeText, jd) {
  const prompt = `You are a senior HR recruiter. Analyze this resume against the job description.
Return ONLY valid JSON. No markdown, no code fences, no extra text.

JOB DESCRIPTION:
${jd}

CANDIDATE: ${name}
RESUME TEXT:
${resumeText.slice(0, 4000)}

Return this exact JSON structure:
{
  "score": <integer 0-100>,
  "recommendation": "Strong Fit",
  "summary": "<one clear sentence about this candidate>",
  "experience_years": "<X years>",
  "top_skill": "<single most relevant skill>",
  "strengths": ["strength 1", "strength 2", "strength 3"],
  "gaps": ["gap 1", "gap 2", "gap 3"],
  "scoring_rationale": "<2-3 sentences explaining score, referencing specific JD requirements>"
}

Rules:
- recommendation = "Strong Fit" if score>=75, "Moderate Fit" if score 50-74, "Not Fit" if score<50
- Score dimensions: Technical Skills Match 40%, Experience Relevance 30%, Education 15%, Communication 15%
- Be specific and reference the JD when identifying strengths and gaps`;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{parts: [{text: prompt}]}],
        generationConfig: {temperature: 0.1, maxOutputTokens: 800, responseMimeType: "application/json"}
      })
    }
  );

  if(!response.ok) {
    const err = await response.json().catch(()=>({}));
    const msg = err?.error?.message || `HTTP ${response.status}`;
    if(response.status === 400) throw new Error('Invalid API key — check your Gemini key.');
    if(response.status === 429) throw new Error('Rate limited — wait 30 seconds and retry.');
    throw new Error(msg);
  }

  const data = await response.json();
  const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
  const clean = raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
  const parsed = JSON.parse(clean);
  parsed.score = Math.max(0, Math.min(100, parseInt(parsed.score, 10) || 0));
  return parsed;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return [];

  // Parse header row (handles quoted headers)
  const parseRow = line => {
    const cells = [];
    let cur = '', inQ = false;
    for(const ch of line) {
      if(ch === '"') { inQ = !inQ; }
      else if(ch === ',' && !inQ) { cells.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
      else cur += ch;
    }
    cells.push(cur.replace(/^"|"$/g,'').trim());
    return cells;
  };

  const headers = parseRow(lines[0]).map(h => h.toLowerCase().replace(/[\s-]+/g,'_'));
  const result = [];

  for(let i = 1; i < lines.length; i++) {
    if(!lines[i].trim()) continue;
    const cells = parseRow(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (cells[idx] || '').trim(); });
    if(obj.name && obj.name.length > 1) result.push(obj);
  }
  return result;
}

function csvRowToResult(obj) {

    name: obj.name || 'Unknown',
    score: parseInt(obj.score) || 0,
    recommendation: obj.recommendation || 'Not Fit',
    experience_years: obj.experience_years || obj.experience || '—',
    top_skill: obj.top_skill || '—',
    strengths: [obj.strength1, obj.strength2, obj.strength3].filter(Boolean),
    gaps: [obj.gap1, obj.gap2, obj.gap3].filter(Boolean),
    summary: obj.summary || '',
    text: obj.resume_text || obj.text || obj.resume || '',
  };
}

function exportCSV(results) {
  const headers = ['Rank','Name','Score','Recommendation','Experience','Top Skill',
    'Strength 1','Strength 2','Strength 3','Gap 1','Gap 2','Gap 3','Summary','Resume Text'];
  const rows = results.map((r,i) => [
    i+1, r.name, r.score, r.recommendation, r.experience_years||'', r.top_skill||'',
    ...(r.strengths||[]).slice(0,3).map(s=>s||''),
    ...(r.gaps||[]).slice(0,3).map(g=>g||''),
    r.summary||'', (r.text||'').replace(/\n/g,' ')
  ]);
  const csv = [headers, ...rows].map(r =>
    r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')
  ).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `helios_results_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

    setLoading(true);
    try {
      const prompt = `You are an expert HR consultant. Explain in structured detail why this candidate scored ${result.score}/100 for this role.

JOB DESCRIPTION:
${jd}

CANDIDATE: ${result.name}
SCORE: ${result.score}/100  
RECOMMENDATION: ${result.recommendation}
RESUME:
${(result.text||'').slice(0,3000)}

Explain the score across all 4 dimensions:
1. Technical Skills Match (40%) — what exactly matched or didn't vs the JD
2. Experience Relevance (30%) — years, domain fit, depth
3. Education & Certifications (15%) — degree relevance
4. Communication Quality (15%) — how it came across in the resume

Be specific. Reference actual JD requirements.`;

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,

function App() {
  // screen: 'setup' | 'scanning' | 'results'
  const [screen, setScreen] = useState('setup');
  const [resultTab, setResultTab] = useState('ranked');

  // API
  const [apiKey, setApiKey] = useState('');
  const [apiSaved, setApiSaved] = useState(false);
  const [apiErr, setApiErr] = useState('');

  // JD
  const [jd, setJd] = useState(DEFAULT_JD);

  // Candidates queue (unscored, waiting to be analyzed)
  const [queue, setQueue] = useState([]);

  // Pre-scored candidates (from CSV with scores) - bypass AI
  const [preScored, setPreScored] = useState([]);

  // Results
  const [results, setResults] = useState([]);
  const [expanded, setExpanded] = useState(null);
  const [modalResult, setModalResult] = useState(null);

  // Scanning state
  const [scanProgress, setScanProgress] = useState({cur:0, total:0, name:''});
  const [scanError, setScanError] = useState('');
  const abortRef = useRef(false);

  // Add form state
  const [candName, setCandName] = useState('');
  const [candText, setCandText] = useState('');
  const [fileState, setFileState] = useState('idle'); // idle|loading|done|err
  const [fileMsg, setFileMsg] = useState('');

  // CSV
  const [csvMsg, setCsvMsg] = useState('');
  const [csvBusy, setCsvBusy] = useState(false);

  // Sample load
  const [sampleLoaded, setSampleLoaded] = useState(false);

  /* ── API Key ── */
  const saveKey = () => {
    const k = apiKey.trim();
    if(k.startsWith('AIza') && k.length > 20) { setApiSaved(true); setApiErr(''); }
    else setApiErr('Gemini keys start with "AIza…" and are 39+ characters.');
  };

  /* ── File upload: DOCX or PDF ── */
  const handleFile = async e => {
    const file = e.target.files?.[0];
    if(!file) return;
    e.target.value = '';
    setFileState('idle'); setFileMsg('');

    if(!candName.trim()) {
      setFileState('err');
      setFileMsg('Enter candidate name first, then upload.');
      return;
    }

    const ext = file.name.split('.').pop().toLowerCase();
    if(!['docx','pdf'].includes(ext)) {
      setFileState('err');
      setFileMsg('Only .docx and .pdf files supported.');
      return;
    }

    setFileState('loading');
    setFileMsg(`Reading "${file.name}"…`);

    try {
      const buffer = await file.arrayBuffer();
      let text = '';

      if(ext === 'docx') {
        const result = await mammoth.extractRawText({arrayBuffer: buffer});
        text = result.value.trim();
      } else {
        text = await extractPDF(buffer);
      }

      if(!text || text.length < 30) {
        setFileState('err');
        setFileMsg('Could not extract text. File may be scanned/image-based. Paste text manually.');
        return;
      }

      setCandText(text);
      setFileState('done');
      setFileMsg(`✓ ${file.name} — ${text.length.toLocaleString()} characters extracted`);
    } catch(err) {
      setFileState('err');
      setFileMsg('Error: ' + err.message);
    }
  };

  /* ── Add to queue ── */
  const addToQueue = () => {
    if(!candName.trim() || !candText.trim()) return;
    setQueue(p => [...p, {name: candName.trim(), text: candText.trim(), source: 'manual'}]);
    setCandName(''); setCandText('');
    setFileState('idle'); setFileMsg('');
  };

  /* ── Load 80 sample candidates ── */
  const loadSamples = () => {
    // All have scores, so they're pre-scored
    const samples = SAMPLE_DATASET.map(c => ({...c, _source: 'sample'}));
    setPreScored(p => {
      const existing = new Set(p.map(x=>x.name));
      return [...p, ...samples.filter(s=>!existing.has(s.name))];
    });
    setSampleLoaded(true);
  };

  /* ── CSV import ── */
  const handleCSV = async e => {
    const file = e.target.files?.[0];
    if(!file) return;
    e.target.value = '';
    setCsvBusy(true); setCsvMsg('');

    try {
      const text = await file.text();
      const rows = parseCSV(text);

      if(!rows.length) {
        setCsvMsg('⚠ No valid rows found in CSV.');
        setCsvBusy(false);
        return;
      }

      let addedScored = 0, addedQueue = 0;
      const newScored = [];
      const newQueue = [];

      for(const row of rows) {
        const score = parseInt(row.score);
        if(score > 0) {
          newScored.push(csvRowToResult(row));
          addedScored++;
        } else if(row.name && (row.resume_text || row.text)) {
          newQueue.push({
            name: row.name,
            text: row.resume_text || row.text || '',
            source: 'csv'
          });
          addedQueue++;
        } else if(row.name) {
          // Name only - just add to queue with whatever text exists
          newQueue.push({
            name: row.name,
            text: row.resume_text || row.text || row.summary || `Candidate: ${row.name}`,
            source: 'csv'
          });
          addedQueue++;
        }
      }

      if(newScored.length) {
        setPreScored(p => {
          const existing = new Set(p.map(x=>x.name));
          return [...p, ...newScored.filter(s=>!existing.has(s.name))];
        });
      }
      if(newQueue.length) {
        setQueue(p => {
          const existing = new Set(p.map(x=>x.name));
          return [...p, ...newQueue.filter(q=>!existing.has(q.name))];
        });
      }

      setCsvMsg(`✓ Loaded: ${addedScored} pre-scored + ${addedQueue} to analyze`);
    } catch(err) {
      setCsvMsg('⚠ Parse error: ' + err.message);
    }
    setCsvBusy(false);
  };

  /* ── SCAN ── */
  const runScan = async () => {
    const hasWork = queue.length > 0 || preScored.length > 0;
    if(!hasWork) { setScanError('Add candidates first.'); return; }
    if(queue.length > 0 && !apiSaved) { setScanError('Add Gemini API key to analyze new resumes.'); return; }

    setScreen('scanning');
    setScanError('');
    abortRef.current = false;
    setScanProgress({cur:0, total:queue.length, name:''});

    const newResults = [];

    for(let i = 0; i < queue.length; i++) {
      if(abortRef.current) break;
      const c = queue[i];
      setScanProgress({cur:i+1, total:queue.length, name:c.name});
      try {
        const r = await analyzeWithGemini(apiKey, c.name, c.text, jd);
        newResults.push({name:c.name, text:c.text, ...r});
      } catch(err) {
        newResults.push({
          name: c.name, text: c.text,
          score: 0, recommendation: 'Not Fit',
          summary: 'Analysis failed: ' + err.message,
          strengths: [], gaps: ['Error: ' + err.message],
          experience_years: '—', top_skill: '—'
        });
        if(err.message.includes('Invalid API key')) {
          setScanError('Invalid API key — stopped early.');
          break;
        }
      }
    }

    // Merge pre-scored + newly analyzed, sort by score
    const allResults = [...preScored, ...newResults].sort((a,b) => b.score - a.score);
    setResults(allResults);
    setQueue([]);
    setPreScored([]);
    setScreen('results');
    setResultTab('ranked');
  };

  /* ── Remove candidate (auto-promote from wait queue) ── */
  const removeResult = useCallback(name => {
    setResults(prev => prev.filter(r => r.name !== name));
  }, []);

  /* ── Back to setup (keeping results) ── */
  const backToSetup = () => {
    setScreen('setup');
    setScanError('');
  };

  /* ── COMPUTED ── */
  const totalCands = queue.length + preScored.length;
  const pct = scanProgress.total > 0
    ? Math.round((scanProgress.cur / scanProgress.total) * 100)
    : 0;

  const strongC = results.filter(r=>r.score>=75).length;
  const modC = results.filter(r=>r.score>=50&&r.score<75).length;
  const notC = results.filter(r=>r.score<50).length;
  const avgScore = results.length
    ? Math.round(results.reduce((s,r)=>s+(r.score||0),0)/results.length)
    : 0;

  /* ══════════════════════════════════════
     RENDER
  ══════════════════════════════════════ */
  return (
    <>
    {modalResult && (
      <ResumeModal
        result={modalResult}
        onClose={() => setModalResult(null)}
        apiKey={apiSaved ? apiKey : ''}
        jd={jd}
      />
    )}

    {/* HEADER */}
    <div className="hdr">
      <div className="logo">
        <div className="logo-ico">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="11" r="7" fill="#ffd580" opacity=".9"/>
            <path d="M16 18L10.5 30L16 26.5L21.5 30Z" fill="#ffd580" opacity=".7"/>
            <circle cx="16" cy="11" r="3.5" fill="#fff" opacity=".95"/>
            <circle cx="16" cy="11" r="1.8" fill="#ffb020"/>
          </svg>
        </div>
        <div>
          <h1>Helios Resume Scanner</h1>
          <p>AI-powered candidate screening · Gemini 2.0 Flash</p>
        </div>
      </div>
      <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
        {screen === 'results' && (
          <button className="btn" onClick={backToSetup}>← Add more candidates</button>
        )}
        <span className="hdr-pill">⚡ v3.0</span>
      </div>
    </div>

    {/* ══ SETUP SCREEN ══ */}

      <div className="screen">

        {/* API Key */}
        {!apiSaved ? (
          <div className="api-band">
            <h3>🔑 Connect Gemini API Key — required to analyze resumes</h3>
            <p>Free tier · 1,500 requests/day · no credit card · <a href="https://aistudio.google.com" target="_blank" rel="noreferrer">aistudio.google.com</a> → Sign in → Get API Key</p>

              <input

                onKeyDown={e=>e.key==='Enter'&&saveKey()}
                placeholder="AIzaSy…"
              />
              <button className="api-save" onClick={saveKey}>Save key →</button>
            </div>
            {apiErr && <div className="api-err">{apiErr}</div>}
            <div className="api-note">Skip this if you only want to use pre-scored CSV candidates (no AI analysis needed).</div>
          </div>
        ) : (
          <div className="api-ok">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <polyline points="20 6 9 17 4 12"/>

                <div className="queue-title">
                  <span>📋 Ready to scan</span>
                  {queue.length > 0 && (
                    <span style={{background:'var(--accent-bg)',color:'var(--accent)',border:'1px solid #b3cdf5',fontSize:9,padding:'1px 6px',borderRadius:8,fontWeight:700}}>
                      {queue.length} will be analyzed by AI
                    </span>
                  )}
                  {preScored.length > 0 && (
                    <span style={{background:'var(--green-bg)',color:'var(--green)',border:'1px solid var(--green-bd)',fontSize:9,padding:'1px 6px',borderRadius:8,fontWeight:700}}>
                      {preScored.length} pre-scored
                    </span>
                  )}
                </div>
                <div style={{maxHeight:200,overflowY:'auto'}}>
                  {preScored.map((c,i) => (
                    <div key={'ps-'+i} className="q-item">
                      <div className="q-av" style={{...avStyle(c.name),border:'none'}}>{inits(c.name)}</div>
                      <div className="q-name">{c.name}</div>
                      <span className="q-tag" style={{background:'var(--green-bg)',color:'var(--green)',borderColor:'var(--green-bd)'}}>
                        score: {c.score}
                      </span>
                      <button className="q-del" onClick={()=>setPreScored(p=>p.filter((_,j)=>j!==i))}>×</button>
                    </div>
                  ))}
                  {queue.map((c,i) => (
                    <div key={'q-'+i} className="q-item">
                      <div className="q-av" style={{...avStyle(c.name),border:'none'}}>{inits(c.name)}</div>
                      <div className="q-name">{c.name}</div>
                      <span className="q-tag">{c.source}</span>
                      <button className="q-del" onClick={()=>setQueue(p=>p.filter((_,j)=>j!==i))}>×</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* SCAN BUTTON */}
        {scanError && (
          <div style={{textAlign:'center',color:'var(--red)',fontSize:13,marginBottom:10}}>
            {scanError}
          </div>
        )}
        <div className="scan-wrap">
          <button
            className="scan-btn"
            onClick={runScan}
            disabled={totalCands === 0 || (queue.length > 0 && !apiSaved)}
          >
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Scan {totalCands > 0 ? totalCands + ' Resume' + (totalCands!==1?'s':'') : 'Resumes'}
          </button>
          {totalCands === 0 && (
            <div className="scan-hint">Add candidates above or load the 80 sample dataset to begin</div>
          )}
          {queue.length > 0 && !apiSaved && (
            <div className="scan-hint" style={{color:'var(--red)'}}>
              ⚠ Add Gemini API key to analyze the {queue.length} manual/CSV candidate{queue.length!==1?'s':''}
            </div>
          )}
          {preScored.length > 0 && queue.length === 0 && (
            <div className="scan-hint" style={{color:'var(--green)'}}>
              ✓ {preScored.length} pre-scored candidates will go straight to results (no API needed)
            </div>
          )}
        </div>
      </div>
    )}

    {/* ══ SCANNING SCREEN ══ */}
    {screen === 'scanning' && (
      <div className="screen scan-screen">
        <div style={{fontSize:52,marginBottom:14}}>
          {pct >= 100 ? '✅' : '🔍'}
        </div>
        <h2>{pct >= 100 ? 'Analysis Complete!' : 'Scanning Resumes…'}</h2>
        <p className="sub">
          {pct >= 100
            ? 'Building your results dashboard…'
            : `Gemini AI is analyzing each resume against your JD`
          }
        </p>
        <div className="prog-track">
          <div className="prog-fill" style={{width: `${Math.max(pct, scanProgress.total===0?100:0)}%`}}/>
        </div>
        <div className="prog-txt">
          {scanProgress.total > 0
            ? `${scanProgress.cur} of ${scanProgress.total} analyzed · ${pct}%`
            : 'Processing pre-scored candidates…'
          }
        </div>
        {scanProgress.name && (
          <div className="scan-name">Analyzing: {scanProgress.name}</div>
        )}
        <div className="scan-dots">
          <div className="dot"/>
          <div className="dot"/>
          <div className="dot"/>
        </div>
        {scanError && (
          <div style={{color:'var(--red)',fontSize:13,marginTop:16,maxWidth:400}}>{scanError}</div>
        )}
      </div>
    )}

    {/* ══ RESULTS SCREEN ══ */}
    {screen === 'results' && (
      <div className="screen">
        {/* Header bar */}
        <div className="res-hdr-bar">
          <div>
            <div className="res-title">Screening Results</div>
            <div className="res-sub">
              Ranked by AI score · click card to expand · CV = full resume · × = remove candidate
            </div>
          </div>
          <div className="res-actions">
            <label className="file-btn" style={{opacity:csvBusy?.4:1}}>
              <input type="file" accept=".csv,text/csv" onChange={handleCSV} disabled={csvBusy}/>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Import CSV
            </label>
            <button className="btn btn-p" onClick={() => exportCSV(results)}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Export CSV
            </button>
            {csvMsg && (
              <span style={{fontSize:10,fontWeight:600,color:csvMsg.startsWith('✓')?'var(--green)':'var(--amber)'}}>
                {csvMsg}
              </span>
            )}
          </div>
        </div>

        {/* Metrics */}
        <div className="metrics">
          {[
            {l:'Total',v:results.length,c:'var(--ink)'},
            {l:'Strong Fit ≥75',v:strongC,c:'var(--green)'},
            {l:'Moderate 50–74',v:modC,c:'var(--amber)'},
            {l:'Not Fit <50',v:notC,c:'var(--red)'},
            {l:'Avg Score',v:avgScore,c:'var(--ink)'},
          ].map((m,i) => (
            <div key={i} className="metric">
              <div className="m-l">{m.l}</div>
              <div className="m-v" style={{color:m.c}}>{m.v}</div>
            </div>
          ))}
        </div>

        {/* Result tabs */}
        <div className="tabs">
          <button className={`tab ${resultTab==='ranked'?'on':''}`} onClick={()=>setResultTab('ranked')}>
            📊 Ranked Results ({results.length})
          </button>
          <button className={`tab ${resultTab==='table'?'on':''}`} onClick={()=>setResultTab('table')}>
            🗂 Data Table
          </button>
          <button className={`tab ${resultTab==='sop'?'on':''}`} onClick={()=>setResultTab('sop')}>
            📋 SOP & Guide
          </button>
        </div>

        {/* ── RANKED ── */}
        {resultTab === 'ranked' && (
          <>
            {BANDS.map(band => {
              const inBand = results.filter(r => r.score >= band.min && r.score <= band.max);
              if(!inBand.length) return null;
              return (
                <div key={band.label}>
                  <div className="band-hdr" style={{background:band.bg,color:band.clr,border:`1px solid ${band.bd}`}}>
                    <span>{band.label}</span>
                    <span style={{marginLeft:'auto',opacity:.7}}>
                      {inBand.length} candidate{inBand.length!==1?'s':''}
                    </span>
                  </div>
                  {inBand.map(r => {
                    const globalRank = results.indexOf(r) + 1;
                    return (
                      <ResultCard
                        key={r.name}
                        result={r}
                        rank={globalRank}
                        expanded={expanded === r.name}
                        onToggle={() => setExpanded(expanded === r.name ? null : r.name)}
                        onRemove={() => removeResult(r.name)}
                        onView={() => setModalResult(r)}
                      />
                    );
                  })}
                </div>
              );
            })}
          </>
        )}

        {/* ── TABLE ── */}
        {resultTab === 'table' && (
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Score</th>
                  <th>Fit</th>
                  <th>Experience</th>
                  <th>Top Skill</th>
                  <th>Key Strength</th>
                  <th>Key Gap</th>
                </tr>
              </thead>
              <tbody>
                {results.map((r,i) => {
                  const s = ss(r.score);
                  return (
                    <tr key={r.name} onClick={() => setModalResult(r)}>
                      <td style={{fontWeight:700,color:i<3?'var(--gold)':'var(--ink3)'}}>{i+1}</td>
                      <td style={{fontWeight:600,whiteSpace:'nowrap'}}>{r.name}</td>
                      <td style={{fontWeight:800,fontFamily:"'DM Mono',monospace",fontSize:13,color:s.clr}}>{r.score}</td>
                      <td><span className={`badge-rec ${rc(r.recommendation)}`}>{r.recommendation}</span></td>
                      <td style={{color:'var(--ink3)'}}>{r.experience_years||'—'}</td>
                      <td style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.top_skill||'—'}</td>
                      <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--green)'}}>
                        {(r.strengths||[])[0]||'—'}
                      </td>
                      <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--red)'}}>
                        {(r.gaps||[])[0]||'—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div style={{fontSize:10,color:'var(--ink3)',padding:'8px 10px'}}>
              💡 Click any row to view full resume and AI score explanation
            </div>
          </div>
        )}

        {/* ── SOP ── */}
        {resultTab === 'sop' && (
          <>
            <div className="info-box">
              <h2>How Helios Resume Scanner Works</h2>
              <h3>Flow</h3>
              <p>Paste JD → Add candidates (DOCX, PDF, paste, or CSV) → Click Scan → Get ranked results with AI-scored strengths, gaps and recommendations.</p>
              <h3>AI Scoring (Gemini 2.0 Flash)</h3>
              <p>Each resume is compared to your JD across 4 weighted dimensions. Results are ranked 0-100 and grouped by fit band. Click "Why this score?" on any card for a full AI-generated rationale.</p>
              <h3>Resume Upload</h3>
              <p>Supports .docx (via mammoth.js) and .pdf (via PDF.js) — text extracted entirely in your browser, nothing uploaded to any server.</p>
              <h3>CSV Format</h3>
              <p>Import: name + resume_text (required). If score column is present and > 0, candidate is pre-scored and skips AI. Export includes all fields for audit trail.</p>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:10}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:19}}>Standard Operating Procedure</div>
              <button className="btn btn-p" onClick={() => {
                const blob = new Blob([SOP], {type:'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href=url; a.download='Helios-SOP-v3.txt'; a.click();
                URL.revokeObjectURL(url);
              }}>↓ Download SOP</button>
            </div>
            <div style={{background:'#fff',border:'1px solid var(--paper3)',borderRadius:'var(--r-lg)',overflow:'hidden'}}>
              <div style={{padding:'12px 16px',background:'var(--accent)',color:'#a8c8f0',fontSize:12}}>
                <strong style={{color:'#fff',fontFamily:"'DM Serif Display',serif"}}>Purpose: </strong>
                Reduce manual screening time by 70%+ using AI while maintaining consistent evaluation.
              </div>
              <div className="sop-pre">{SOP}</div>
            </div>
          </>
        )}

      </div>
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
